<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datepicker UI</title>
  <style>
    body {
      background-color: #f2f2f2;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .datepicker {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
      padding: 20px;
    }

    .datepicker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #4CAF50;
      color: white;
      border-radius: 8px 8px 0 0;
      padding: 10px;
    }

    .arrow {
      cursor: pointer;
      font-weight: bold;
      font-size: 20px;
    }

    .month {
      font-weight: bold;
      font-size: 18px;
    }

    .weekdays, .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-top: 10px;
    }

    .weekdays div {
      font-weight: bold;
      color: #333;
    }

    .days div {
      padding: 10px;
      border-radius: 5px;
      transition: 0.3s;
    }

    .days div:hover {
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }

    .today {
      background-color: #4CAF50;
      color: white;
      border-radius: 5px;
    }

    .selected {
      background-color: orange;
      color: white;
    }
  </style>
</head>
<body>

  <div class="datepicker">
    <div class="datepicker-header">
      <div class="arrow">&#10094;</div>
      <div class="month">October 2025</div>
      <div class="arrow">&#10095;</div>
    </div>

    <div class="weekdays">
      <div>Sun</div>
      <div>Mon</div>
      <div>Tue</div>
      <div>Wed</div>
      <div>Thu</div>
      <div>Fri</div>
      <div>Sat</div>
    </div>

    <div class="days">
      <div></div><div></div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
      <div>6</div><div>7</div><div>8</div><div>9</div><div>10</div><div>11</div><div>12</div>
      <div>13</div><div>14</div><div>15</div><div>16</div><div class="selected">17</div><div>18</div><div>19</div>
      <div>20</div><div>21</div><div>22</div><div>23</div><div>24</div><div>25</div><div>26</div>
      <div>27</div><div>28</div><div>29</div><div>30</div><div>31</div>
    </div>
  </div>

</body>
</html>
